<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">The Season and Flyer entertainment web case-study visual</title>
  <desc id="desc">A self-hosted visual summarizing entertainment website launch work, motion systems, and responsive frontend implementation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#000f21"/>
      <stop offset="1" stop-color="#081827"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" x2="1">
      <stop offset="0" stop-color="#fb7b16"/>
      <stop offset="1" stop-color="#ffb703"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <path d="M0 630 C210 540 372 548 560 592 C726 630 916 632 1280 486 L1280 720 L0 720 Z" fill="#061427"/>
