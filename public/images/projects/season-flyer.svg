  <text x="112" y="148" fill="#fb7b16" font-family="Arial, sans-serif" font-size="20" font-weight="700" letter-spacing="4">DIGITAL EXPERIENCES</text>
  <text x="112" y="238" fill="#ffffff" font-family="Arial, sans-serif" font-size="72" font-weight="800">Broadway &amp; Live</text>
  <text x="112" y="314" fill="#ffffff" font-family="Arial, sans-serif" font-size="72" font-weight="800">Entertainment Sites</text>
  <text x="116" y="370" fill="#dbe4ef" font-family="Arial, sans-serif" font-size="24">Creative direction translated into responsive launch systems.</text>
