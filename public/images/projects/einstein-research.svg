<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Albert Einstein College of Medicine research visualization case-study visual</title>
  <desc id="desc">A self-hosted research tool interface visual showing neuroscience data exploration, rendering, and workflow refinement.</desc>
  <defs>
    <radialGradient id="signal" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#fb7b16"/>
      <stop offset=".48" stop-color="#2f7cff"/>
      <stop offset="1" stop-color="#031225"/>
    </radialGradient>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#000f21"/>
      <stop offset="1" stop-color="#09172a"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <rect x="70" y="62" width="1140" height="596" rx="10" fill="#071628" stroke="rgba(255,255,255,.18)"/>
  <rect x="102" y="98" width="264" height="524" rx="8" fill="#0d1d31" stroke="rgba(255,255,255,.12)"/>
  <text x="130" y="150" fill="#ffffff" font-family="Arial, sans-serif" font-size="27" font-weight="800">Research Toolkit</text>
  <text x="130" y="190" fill="#8da0b8" font-family="Arial, sans-serif" font-size="16">Dataset navigation</text>
  <g transform="translate(130 238)" stroke-linecap="round">
    <path d="M0 0H188" stroke="#fb7b16" stroke-width="8"/>
    <path d="M0 48H162" stroke="rgba(255,255,255,.34)" stroke-width="8"/>
    <path d="M0 96H202" stroke="rgba(255,255,255,.24)" stroke-width="8"/>
    <path d="M0 144H146" stroke="rgba(255,255,255,.24)" stroke-width="8"/>
    <path d="M0 192H214" stroke="rgba(255,255,255,.18)" stroke-width="8"/>
  </g>
  <rect x="414" y="98" width="612" height="524" rx="8" fill="#030c19" stroke="rgba(255,255,255,.14)"/>
  <circle cx="720" cy="360" r="188" fill="url(#signal)" opacity=".7"/>
  <g fill="none" opacity=".72" stroke-linecap="round">
    <path d="M572 354 C640 202 774 186 866 310 C928 394 850 502 718 510 C590 518 504 452 572 354Z" stroke="#ffffff" stroke-width="2"/>
    <path d="M610 378 C650 280 754 260 826 334 C872 382 830 456 720 468 C628 478 568 438 610 378Z" stroke="#fb7b16" stroke-width="2"/>
    <path d="M548 424 C660 406 754 330 916 380" stroke="#ffb703" stroke-width="3"/>
    <path d="M516 320 C662 342 776 420 930 270" stroke="#2f7cff" stroke-width="3"/>
  </g>
  <g transform="translate(1060 134)">
    <text fill="#fb7b16" font-family="Arial, sans-serif" font-size="14" font-weight="800" letter-spacing="2">REFINEMENTS</text>
    <rect y="34" width="108" height="92" rx="8" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.12)"/>
    <text x="18" y="70" fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="800">UI</text>
    <text x="18" y="102" fill="#8da0b8" font-family="Arial, sans-serif" font-size="13">states</text>
    <rect y="150" width="108" height="92" rx="8" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.12)"/>
    <text x="18" y="186" fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="800">Load</text>
    <text x="18" y="218" fill="#8da0b8" font-family="Arial, sans-serif" font-size="13">speed</text>
    <rect y="266" width="108" height="92" rx="8" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.12)"/>
    <text x="18" y="302" fill="#ffffff" font-family="Arial, sans-serif" font-size="20" font-weight="800">Flow</text>
    <text x="18" y="334" fill="#8da0b8" font-family="Arial, sans-serif" font-size="13">clarity</text>
  </g>
  <text x="102" y="682" fill="#8da0b8" font-family="Arial, sans-serif" font-size="16">Self-hosted research-interface visual with proprietary data excluded.</text>
</svg>
