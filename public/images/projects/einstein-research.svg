<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Representative research visualization workflow</title>
  <desc id="desc">An abstract workflow diagram for dataset loading, visualization rendering, and interface refinement. It is not the original research interface or research data.</desc>
