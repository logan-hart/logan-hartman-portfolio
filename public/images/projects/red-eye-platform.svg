<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Red Eye Tickets product platform workflow visual</title>
  <desc id="desc">A self-hosted Red Eye Tickets case-study visual showing event commerce, payments, check-in, and operations workflows.</desc>
  <rect width="1280" height="720" fill="#000f21"/>
  <rect x="72" y="70" width="1136" height="580" rx="10" fill="#071628" stroke="rgba(255,255,255,.16)"/>
