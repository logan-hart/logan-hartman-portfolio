    <rect x="464" width="254" height="118" rx="8" fill="rgba(255,255,255,.06)" stroke="rgba(255,255,255,.15)"/>
    <text x="490" y="48" fill="#fb7b16" font-family="Arial, sans-serif" font-size="28" font-weight="800">$900K+</text>
    <text x="490" y="82" fill="#dbe4ef" font-family="Arial, sans-serif" font-size="17">gross payment volume</text>
