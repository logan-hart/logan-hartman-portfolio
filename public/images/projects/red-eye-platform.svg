  <text x="112" y="214" fill="#ffffff" font-family="Arial, sans-serif" font-size="70" font-weight="800">Red Eye Tickets</text>
  <text x="116" y="260" fill="#dbe4ef" font-family="Arial, sans-serif" font-size="24">Commerce, admissions, producer tools, reporting, and support operations.</text>
  <text x="116" y="306" fill="#8da0b8" font-family="Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="2">PRODUCTION FLOORS · JULY 21, 2026</text>
